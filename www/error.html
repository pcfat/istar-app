<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無網絡連接</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1E88E5 0%, #64B5F6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 320px;
        }
        .icon {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 60px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #1E88E5;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>無法連線</h1>
        <p>請檢查您的網絡連線，然後重試。</p>
        <button class="btn" onclick="location.reload()">重新嘗試</button>
    </div>
</body>
</html>
