<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2196F3">
    <title>無網絡連接 - i-STAR管理系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(120deg, #2196F3 0%, #6EC6FF 70%, #ffffff 100%);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .main-content {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            margin: 24px;
        }

        .error-section {
            padding: 2.5rem 2rem;
            background: white;
            text-align: center;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        .error-title {
            color: #1e293b;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .error-message {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .btn-reload {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(90deg, #2196F3 0%, #6EC6FF 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-reload:active { opacity: 0.85; }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .bg-anim {
            position: fixed;
            border-radius: 50%;
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
            filter: blur(2px);
        }

        @media (max-width: 400px) {
            .main-content { margin: 16px; border-radius: 16px; }
            .error-section { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="bg-animations"></div>

    <div class="main-content">
        <div class="error-section">
            <div class="logo-container">
                <img src="assets/logo.png" alt="星進教育 Logo">
            </div>

            <h2 class="error-title">無網絡連接</h2>
            <p class="error-message">無法連接到網絡，請檢查您的<br>網絡連接後重試。</p>

            <button type="button" class="btn-reload" onclick="window.location.href='https://s.istars.hk/app/index.php'">
                <svg viewBox="0 0 512 512" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path fill="white" d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-316.4 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"/>
                </svg>
                重新載入
            </button>

            <div class="footer-text">
                <p>© 2025 星進教育 i-STAR Education</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var container = document.getElementById('bg-animations');
            var style = document.createElement('style');
            document.head.appendChild(style);

            for (var i = 1; i <= 15; i++) {
                var size = Math.floor(Math.random() * (120 - 30) + 30);
                var opacity = (Math.floor(Math.random() * 12 + 5)) / 100;
                var lr = Math.random() < 0.5 ? 'left' : 'right';
                var tb = Math.random() < 0.5 ? 'top' : 'bottom';
                var lrVal = Math.floor(Math.random() * 90);
                var tbVal = Math.floor(Math.random() * 90);
                var color = Math.random() < 0.5 ? '#2196F3' : '#6EC6FF';
                var duration = Math.floor(Math.random() * 10 + 6);
                var anim = 'float' + i;

                var tx0 = Math.floor(Math.random() * 50 - 25);
                var ty0 = Math.floor(Math.random() * 50 - 25);
                var sc0 = (Math.floor(Math.random() * 15 + 100)) / 100;
                var tx1 = Math.floor(Math.random() * 50 - 25);
                var ty1 = Math.floor(Math.random() * 50 - 25);
                var sc1 = (Math.floor(Math.random() * 15 + 100)) / 100;

                var div = document.createElement('div');
                div.className = 'bg-anim bg-anim' + i;
                container.appendChild(div);

                style.textContent +=
                    '.bg-anim' + i + '{' +
                    'width:' + size + 'px;height:' + size + 'px;' +
                    'background:radial-gradient(circle,' + color + ' 60%,transparent 100%);' +
                    'opacity:' + opacity + ';' +
                    'position:fixed;' + lr + ':' + lrVal + '%;' + tb + ':' + tbVal + '%;' +
                    'animation:' + anim + ' ' + duration + 's infinite ease-in-out;' +
                    '}' +
                    '@keyframes ' + anim + '{' +
                    '0%,100%{transform:translate(' + tx0 + 'px,' + ty0 + 'px) scale(' + sc0 + ')}' +
                    '50%{transform:translate(' + tx1 + 'px,' + ty1 + 'px) scale(' + sc1 + ')}' +
                    '}';
            }
        })();
    </script>
</body>
</html>
